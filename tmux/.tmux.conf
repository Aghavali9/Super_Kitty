# =============================================================================
# TMUX CONFIG
# =============================================================================

# Change prefix from Ctrl+B to Ctrl+A (easier to reach)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Windows and panes start at 1 (not 0)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# True color support (required for Starship + bat themes to render correctly)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Use zsh as default shell
set-option -g default-shell /bin/zsh

# Increase scrollback buffer
set -g history-limit 50000

# Mouse support
set -g mouse on

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Intuitive splits — open in current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"

# Reload config in-place
bind r source-file ~/.tmux.conf \; display-message "✓ tmux.conf reloaded"

# -----------------------------------------------------------------------------
# STATUS BAR
# -----------------------------------------------------------------------------

set -g status-position top
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-left '#[bold]  #S '
set -g status-right '#[fg=#89b4fa]%H:%M #[fg=#a6e3a1]%d-%b-%y'
set -g window-status-current-style 'bold fg=#cba6f7'

# -----------------------------------------------------------------------------
# PLUGINS (via TPM)
# Install TPM first: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then press Ctrl+A then I (capital i) to install plugins
# -----------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # Save/restore sessions across reboots
set -g @plugin 'tmux-plugins/tmux-continuum'   # Auto-save every 15 min
set -g @plugin 'tmux-plugins/tmux-yank'        # Copy to system clipboard

set -g @continuum-restore 'on'

# Keep this at the very bottom
run '~/.tmux/plugins/tpm/tpm'
