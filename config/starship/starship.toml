# Starship prompt configuration
# Docs: https://starship.rs/config/

# Timeout for commands (ms)
command_timeout = 500

# Insert a blank line between shell prompts
add_newline = true

format = """
$username$hostname$directory$git_branch$git_status$python$nodejs$rust$golang$cmd_duration$line_break$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"

[directory]
truncation_length   = 3
truncate_to_repo    = true
style               = "bold cyan"

[git_branch]
symbol = " "
style  = "bold purple"

[git_status]
format      = '([\[$all_status$ahead_behind\]]($style) )'
style       = "bold yellow"
conflicted  = "⚡"
ahead       = "⇡${count}"
behind      = "⇣${count}"
diverged    = "⇕⇡${ahead_count}⇣${behind_count}"
untracked   = "?"
stashed     = "$"
modified    = "!"
staged      = "+"
renamed     = "»"
deleted     = "✘"

[python]
symbol = " "
style  = "bold yellow"

[nodejs]
symbol = " "
style  = "bold green"

[rust]
symbol = " "
style  = "bold red"

[golang]
symbol = " "
style  = "bold cyan"

[cmd_duration]
min_time = 2000
format   = "took [$duration](bold yellow) "
